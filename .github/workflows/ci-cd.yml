# ──────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline – AI Sales Intelligence Platform
# Triggers on push / PR to main branch
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend – Python linting & tests
  # ─────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as non-blocking (exit-zero)
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Verify model export script
        run: |
          python export_models.py
          test -f backend/models/deal_model.pkl
          test -f backend/models/revenue_model.pkl
          test -f backend/models/sentiment_model.pkl

      - name: Run backend tests (if any)
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "No tests directory found – skipping."
          fi

  # ─────────────────────────────────────────────
  # 2. Frontend – Node build check
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint -- --max-warnings=0 || echo "Lint warnings found (non-blocking)"

      - name: Build frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Deploy gate (runs only after both pass)
  # ─────────────────────────────────────────────
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed – ready for deployment."
